# Enables patches for specific window managers.
# Currently patched: "awesome", "dwm", "herb"
wm-support = "none";

#################################
#         ANIMATIONS            #
#################################

# Toggles whether animations should be used for windows
animations = true;

# DEĞİŞTİRİLDİ: Pencerelerin ağır çekimde hissettirmesini engellemek için hızlandırıldı. (Eskisi: 120)
animation-stiffness = 200;

# Change the mass of windows
animation-window-mass = 0.5;

# DEĞİŞTİRİLDİ: Animasyon sürtünmesi dengelendi. (Eskisi: 12)
animation-dampening = 20;

# Toggles clamping
animation-clamping = false;

# Set the open window animation.
animation-for-open-window = "zoom";

# Set the closing window animation.
animation-for-unmap-window = "zoom";

# Exclude certain windows from having a open animation.
 animation-open-exclude = [
   "class_g = 'scrot'",
 ];

#################################
#           Corners             #
#################################

# Adjusts the window corner rounding in pixels.
corner-radius = 14;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "widthb>1590 && heightb>800",
];

#################################
#             Shadows           #
#################################

shadow = true;

# The blur radius for shadows, in pixels. (defaults to 16)
shadow-radius = 16;

# The opacity of shadows. (0.0 - 1.0, defaults to 0.75)
shadow-opacity = 0.25;

# The left offset for shadows, in pixels. (defaults to -15)
shadow-offset-x = -15;

# The top offset for shadows, in pixels. (defaults to -15)
shadow-offset-y = -15;

#################################
#           Fading              #
#################################

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

#################################
#   Transparency / Opacity      #
#################################

inactive-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
active-opacity = 1.0;

#################################
#     Background-Blurring       #
#################################

blur-method = "dual_kawase";

# DEĞİŞTİRİLDİ: GPU'yu en çok yoran değer buydu, kasmayı çözmek için düşürüldü. (Eskisi: 5)
blur-strength = 2;

blur-whitelist = false;

blur-include = [
  "class_g = 'Alacritty'",
  "class_g = 'kitty'"
];

blur-exclude = [
  "class_g = 'Firefox'",
  "class_g = 'slop'",
  "class_g = 'maim'"
];

#################################
#       General Settings        #
#################################

backend = "glx";

# EKLENDİ: Ekran kartı performansını artırmak ve takılmaları önlemek için gerekli iki satır.
glx-no-stencil = true;
use-damage = true;

vsync = true;
log-level = "info";
