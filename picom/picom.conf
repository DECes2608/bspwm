# Animasyon Ayarları
animations = true;
animation-stiffness = 300.0;
animation-dampening = 35.0;
animation-clamping = true;
animation-mass = 1.0;
animation-for-open-window = "zoom"; # Pencere açılırken zoom yapar
animation-for-menu-window = "slide-down"; # Menüler aşağı doğru kayar
animation-for-transient-window = "slide-up"; # Geçici pencereler yukarı kayar

# Kaydırma (Sliding) efekti için
animation-for-prev-tag = "minimize";
enable-fading-next-tag = true;
animation-for-next-tag = "slide-in-center";
